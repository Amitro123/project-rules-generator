llm:
  enabled: true
  api_key: "" # Set via env var GROQ_API_KEY
  provider: "groq"
  model: "llama-3.1-70b-versatile" # Recommended for better reasoning than 8b-instant

git:
  auto_commit: true
  commit_message: "Auto-generated rules and skills"
  commit_user_name: "Project Rules Generator"
  commit_user_email: "rules@generator.local"

generation:
  output_format: "markdown"
  include_examples: true
  verbose: true
  max_feature_count: 5
  max_description_length: 200

packs:
  enabled: true
  sources: [] # Default sources to load (e.g., paths or known aliases)

skill_sources:
  builtin:
    enabled: true
    path: "templates/skills"
  
  learned:
    enabled: true
    path: "~/.project-rules-generator/learned_skills"
    auto_save: true
  
  # Priority order (First item = Highest priority)
  preference_order:
    - learned
    - builtin
