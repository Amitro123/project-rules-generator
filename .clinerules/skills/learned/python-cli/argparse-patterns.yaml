# Skill: Argparse Patterns

## Purpose

Every time you need to add a new command-line interface (CLI) to this project, you might instinctively reach for Python's built-in `argparse` module. However, this project is built using `click` for its CLI, leading to inconsistencies, duplicated effort, and a fragmented user experience if `argparse` is introduced. This skill helps you align with the project's established `click` patterns, ensuring a unified, consistent, and maintainable command-line interface.

## Auto-Trigger

Activate when the user mentions:
- **"how to add a new cli command"**
- **"argparse example"**
- **"command line arguments"**
- **"define a new cli"**
- **"cli patterns"**

Do NOT activate for: `web routes`, `api endpoints`, `database schema`

## CRITICAL

- This project uses `click` for its command-line interface. **NEVER** introduce `argparse` for new CLI commands in this project.
- All new CLI features must integrate seamlessly with the existing `click` structure, typically defined in `main.py`.

## Process

### 1. Identify Existing CLI Structure

Understanding the project's current CLI setup is crucial to ensure any new commands integrate correctly.

```bash
grep -r "@click" .
```

### 2. Locate the Main Entry Point

The `main.py` file is the primary entry point for the project's CLI, where the main `click` group or command is typically defined.

```bash
ls main.py
```

### 3. Implement New Click Command

New commands should be added using `click` decorators to maintain consistency with the project's existing CLI patterns.

```bash
