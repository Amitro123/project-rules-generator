name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check existing issues and discussions to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What pain point does this address? What are you trying to do that you can't?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this affect?
      options:
        - CLI commands
        - Rules generation
        - Skill generation
        - AI provider integration
        - Configuration
        - Documentation
        - Other
    validations:
      required: true
