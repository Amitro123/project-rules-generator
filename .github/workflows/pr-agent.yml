name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: PR Agent action step
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set GOOGLE_AI_STUDIO in your repo secrets to enable
          # AI-powered PR analysis via Gemini 2.0 Flash.
          # Fork contributors: this secret is NOT required. PR Agent will
          # still run (with reduced AI capabilities) if it is absent.
          GOOGLE_AI_STUDIO: ${{ secrets.GOOGLE_AI_STUDIO }}
          CONFIG.AI_PROVIDER: "google"
          CONFIG.MODEL: "gemini/gemini-2.0-flash"

