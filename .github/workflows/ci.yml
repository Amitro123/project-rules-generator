name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check (3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e ".[llm]"
      - name: Lint (ruff)
        run: ruff check . --output-format=github
      - name: Format check (black)
        run: black --check .
      - name: Import order (isort)
        run: isort --profile black --check-only .
      - name: Type check (mypy)
        run: mypy generator/ cli/ prg_utils/ --ignore-missing-imports

      - name: Security scan (bandit)
        # Scans for medium+ severity findings. The five LOW-severity IDs
        # that arose from PRG's CLI-tool shape (B101 assert, B404/B603/B607
        # subprocess, B110 try-except-pass) are silenced via [tool.bandit]
        # in pyproject.toml with documented reasons. Any unsilenced
        # finding here fails the build — this is the gate that catches
        # genuinely new security regressions (XSS, hardcoded secrets,
        # weak crypto, etc.).
        run: |
          pip install bandit
          bandit -c pyproject.toml -r generator/ cli/ prg_utils/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
      - name: Run tests
        env:
          GEMINI_API_KEY: ""
          GROQ_API_KEY: ""
        run: pytest --cov=generator --cov=prg_utils --cov-report=term-missing -q

      - name: Skill quality gates
        # Explicit, named step so the quality gate is visible in PR checks.
        # These test files all run as part of the full suite above too,
        # but surfacing them here means a reviewer sees "Skill quality
        # gates" pass/fail at a glance without scanning the 1600-test log.
        # See manus CR.md recommendation #4 and
        # tests/test_builtin_skill_quality_gates.py for the gate that
        # parametrizes validate_quality() over every shipped builtin skill.
        env:
          GEMINI_API_KEY: ""
          GROQ_API_KEY: ""
        run: |
          pytest \
            tests/test_builtin_skill_quality_gates.py \
            tests/test_quality_checker_triggers.py \
            tests/test_readme_to_skill_quality.py \
            -v

  build:
    name: Build & smoke-test package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Smoke-test wheel
        run: |
          pip install --force-reinstall dist/*.whl
          prg --help
          # Deeper smoke: init + analyze on a minimal temp project to catch
          # import-level crashes (e.g. missing runtime deps like `packaging`)
          mkdir /tmp/smoke-proj
          echo "# Smoke project" > /tmp/smoke-proj/README.md
          cd /tmp/smoke-proj && prg init
          prg analyze .
